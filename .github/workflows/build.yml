name: Build Blåhaj VR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download LÖVR APK
        run: |
          curl -L -o lovr.apk https://github.com/bjornbytes/lovr/releases/download/v0.17.0/lovr-android.apk
      
      - name: Inject Blåhaj files
        run: |
          mkdir -p assets
          cp main.lua assets/
          cp blahaj.glb assets/
          cp meow.wav assets/
          zip -ur lovr.apk assets/*
      
      - uses: actions/upload-artifact@v4
        with:
          name: BlahajVR
          path: lovr.apk
