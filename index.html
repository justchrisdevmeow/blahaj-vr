<!DOCTYPE html>
<html>
<head>
  <title>Blåhaj VR</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.3.0/dist/aframe-physics-system.min.js"></script>
</head>
<body>
  <a-scene physics="gravity: -9.8" background="color: #87CEEB">
    
    <!-- Player movement with collision -->
    <a-entity id="player" movement-controls="speed: 3; fly: false" kinematic-body>
      <a-camera id="camera" position="0 1.6 0"></a-camera>
      <a-entity hand-controls="hand: left"></a-entity>
      <a-entity hand-controls="hand: right" raycaster="objects: .grabbable; far: 5; showLine: true">
        <a-entity laser-controls="hand: right"></a-entity>
      </a-entity>
    </a-entity>
    
    <!-- Ground -->
    <a-plane rotation="-90 0 0" width="30" height="30" color="#7CB342" static-body></a-plane>
    
    <!-- Blåhaj -->
    <a-entity 
      gltf-model="url(blahaj.glb)"
      position="0 0.3 -2"
      scale="0.4 0.4 0.4"
      rotation="0 180 0"
      dynamic-body
      class="grabbable"
      grabbable>
      <a-sound src="https://www.myinstants.com/media/sounds/meow_1.mp3" autoplay="false" volume="0.5"></a-sound>
    </a-entity>
    
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" intensity="0.8" position="5 10 5"></a-light>
    <a-text value="Trigger = grab" color="white" position="0 -1 -2.5" scale="0.5 0.5 0.5"></a-text>
  </a-scene>
  
  <script>
    AFRAME.registerComponent('grabbable', {
      init: function() {
        let sound = this.el.querySelector('a-sound');
        this.el.addEventListener('grab-start', () => {
          if (sound) sound.components.sound.playSound();
        });
      }
    });
  </script>
</body>
</html>
