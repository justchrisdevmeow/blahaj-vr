<!DOCTYPE html>
<html>
<head>
  <title>Blåhaj VR - Simple Stable</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.3.0/dist/aframe-physics-system.min.js"></script>
</head>
<body>
  <a-scene physics="gravity: -9.8" background="color: #87CEEB">
    
    <!-- Player with movement and gravity -->
    <a-entity>
      <a-camera position="0 1.6 0">
        <!-- Movement via thumbstick (built-in) -->
        <a-entity wasd-controls></a-entity>
        <a-entity oculus-touch-controls="hand: left"></a-entity>
        <a-entity oculus-touch-controls="hand: right"></a-entity>
      </a-camera>
    </a-entity>
    
    <!-- Ground with gravity -->
    <a-plane rotation="-90 0 0" width="20" height="20" color="#7CB342" static-body></a-plane>
    
    <!-- Blåhaj with gravity (lowered Y) -->
    <a-entity 
      gltf-model="url(blahaj.glb)"
      position="0 0.3 -2"
      scale="0.4 0.4 0.4"
      rotation="0 180 0"
      dynamic-body
      grabbable>
      
      <!-- Meow sound -->
      <a-sound src="https://www.myinstants.com/media/sounds/meow_1.mp3" autoplay="false" volume="0.5"></a-sound>
    </a-entity>
    
    <!-- Simple lighting -->
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" intensity="0.8" position="5 10 5"></a-light>
  </a-scene>
  
  <script>
    AFRAME.registerComponent('grabbable', {
      init: function() {
        this.el.addEventListener('grab-start', () => {
          const sound = this.el.querySelector('a-sound');
          if (sound) sound.components.sound.playSound();
        });
      }
    });
  </script>
</body>
</html>
